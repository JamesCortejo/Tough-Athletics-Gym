<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - Tough Athletics Gym</title>
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/registerstyles.css">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: calc(100% - 40px);
            max-width: 350px;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 0;
            border: none;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-left: 4px solid transparent;
            text-align: center;
            word-wrap: break-word;
        }

        .alert-danger {
            background: #fff5f5;
            color: #721c24;
            border-left-color: #dc3545;
        }

        .alert-success {
            background: #f0fff4;
            color: #0c5460;
            border-left-color: #28a745;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-picture {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0d6efd;
            margin-bottom: 15px;
            background: #f3f4f6;
        }

        .complete-profile-page .registerBox {
            width: min(92vw, 420px);
        }

        .complete-profile-page .formContainer {
            width: 100%;
        }

        .complete-profile-page #completeProfileForm {
            width: 100%;
        }

        .complete-profile-page .form-control {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .complete-profile-page .mb-3 {
            width: 100%;
            text-align: left;
        }

        .complete-profile-page .validation-message {
            text-align: left;
        }

        .form-control:invalid {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }

        .form-control:valid {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        .validation-message {
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .validation-message.invalid {
            color: #dc3545;
        }

        .validation-message.valid {
            color: #198754;
        }
    </style>
</head>

<body class="complete-profile-page">
    <div class="container mt-5">
        <div class="bannerLogo">
            <img src="../images/icons/bannerlogo.png" alt="Banner Logo" class="mb-5"
                style="width: 250px; height: 120px;">
        </div>

        <div class="registerBox d-flex flex-column mb-4">
            <div class="profile-header">
                <img id="profilePicture" src="/images/pfpImages/defaultPfp.png" alt="Profile" class="profile-picture"
                    referrerpolicy="no-referrer" onerror="this.src='/images/pfpImages/defaultPfp.png'">
                <h3 class="text-center mb-3"><b>Complete Your Profile</b></h3>
                <p class="text-muted">Please provide the following information to continue</p>
            </div>

            <div class="formContainer">
                <form id="completeProfileForm">
                    <!-- Mobile Number -->
                    <div class="mb-3">
                        <input type="tel" class="form-control" id="mobile" name="mobile"
                            placeholder="Mobile Number (11 digits, starts with 09, optional)" pattern="09[0-9]{9}"
                            title="Please enter a valid 11-digit mobile number starting with 09">
                        <div id="mobileValidation" class="validation-message">
                            Optional. If provided, must be 11 digits and start with 09.
                        </div>
                    </div>

                    <!-- Gender Dropdown -->
                    <div class="mb-3">
                        <select class="form-control" id="gender" name="gender" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <div id="genderValidation" class="validation-message">
                            Please select your gender
                        </div>
                    </div>

                    <!-- Age -->
                    <div class="mb-3">
                        <input type="number" class="form-control" id="age" name="age" placeholder="Age" min="16"
                            max="100" required>
                        <div id="ageValidation" class="validation-message">
                            Must be between 16 and 100 years old
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-custom w-100 mt-2">Complete Profile</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load user data from localStorage
            const userData = localStorage.getItem('currentUser');
            const token = localStorage.getItem('token');

            console.log('Token from localStorage:', token);
            console.log('User data from localStorage:', userData);

            if (!userData || !token) {
                console.error('Missing user data or token');
                window.location.href = '/?error=missing_user_data';
                return;
            }

            const user = JSON.parse(userData);

            const profilePictureElement = document.getElementById('profilePicture');

            function normalizeProfilePictureUrl(url) {
                if (!url) return null;
                if (url.startsWith('//')) return `https:${url}`;
                return url;
            }

            const rawProfilePicture =
                user.profilePicture || user.picture || user.photoURL || user.photo;
            const normalizedProfilePicture = normalizeProfilePictureUrl(rawProfilePicture);

            if (normalizedProfilePicture) {
                profilePictureElement.src = normalizedProfilePicture;
            }

            // Set existing values if available
            if (user.mobile) document.getElementById('mobile').value = user.mobile;
            if (user.gender) document.getElementById('gender').value = user.gender;
            if (user.age) document.getElementById('age').value = user.age;

            // Get form elements
            const form = document.getElementById('completeProfileForm');
            const mobileInput = document.getElementById('mobile');
            const genderSelect = document.getElementById('gender');
            const ageInput = document.getElementById('age');

            // Get validation message elements
            const mobileValidation = document.getElementById('mobileValidation');
            const genderValidation = document.getElementById('genderValidation');
            const ageValidation = document.getElementById('ageValidation');

            // Real-time validation for mobile number
            mobileInput.addEventListener('input', function () {
                validateMobileNumber();
            });

            // Real-time validation for gender
            genderSelect.addEventListener('change', function () {
                validateGender();
            });

            // Real-time validation for age
            ageInput.addEventListener('input', function () {
                validateAge();
            });

            // Restrict mobile input to numbers only
            mobileInput.addEventListener('keypress', function (e) {
                const char = String.fromCharCode(e.which);
                if (!/[0-9]/.test(char)) {
                    e.preventDefault();
                    return;
                }
            });

            // Prevent pasting non-numeric characters in mobile field
            mobileInput.addEventListener('paste', function (e) {
                e.preventDefault();
                const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                const numbersOnly = pastedText.replace(/\D/g, '');
                const currentValue = this.value.replace(/\D/g, '');
                const newValue = currentValue + numbersOnly;
                this.value = newValue;
            });

            // Validation functions
            function validateMobileNumber() {
                const mobile = mobileInput.value.trim();
                const mobileDigits = mobile.replace(/\D/g, '');

                if (mobileDigits.length === 0) {
                    mobileValidation.textContent = 'Optional. If provided, must be 11 digits and start with 09.';
                    mobileValidation.className = 'validation-message';
                    return true;
                } else if (mobileDigits.length !== 11) {
                    mobileValidation.textContent = `Mobile number must be exactly 11 digits (current: ${mobileDigits.length})`;
                    mobileValidation.className = 'validation-message invalid';
                    return false;
                } else if (!/^09\d{9}$/.test(mobileDigits)) {
                    mobileValidation.textContent = 'Mobile number must start with 09';
                    mobileValidation.className = 'validation-message invalid';
                    return false;
                } else {
                    mobileValidation.textContent = '✓ Valid mobile number format';
                    mobileValidation.className = 'validation-message valid';
                    return true;
                }
            }

            function validateGender() {
                const gender = genderSelect.value;
                if (!gender) {
                    genderValidation.textContent = 'Please select your gender';
                    genderValidation.className = 'validation-message';
                    return false;
                } else {
                    genderValidation.textContent = '✓ Gender selected';
                    genderValidation.className = 'validation-message valid';
                    return true;
                }
            }

            function validateAge() {
                const age = parseInt(ageInput.value);
                if (!ageInput.value) {
                    ageValidation.textContent = 'Must be between 16 and 100 years old';
                    ageValidation.className = 'validation-message';
                    return false;
                } else if (isNaN(age) || age < 16 || age > 100) {
                    ageValidation.textContent = `Age must be between 16 and 100 (current: ${age})`;
                    ageValidation.className = 'validation-message invalid';
                    return false;
                } else {
                    ageValidation.textContent = '✓ Valid age';
                    ageValidation.className = 'validation-message valid';
                    return true;
                }
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                // Validate all fields before submission
                const isMobileValid = validateMobileNumber();
                const isGenderValid = validateGender();
                const isAgeValid = validateAge();

                if (!isMobileValid || !isGenderValid || !isAgeValid) {
                    showError('Please fix the validation errors before submitting.');
                    return;
                }

                const formData = {
                    mobile: document.getElementById('mobile').value.trim(),
                    gender: document.getElementById('gender').value,
                    age: parseInt(document.getElementById('age').value)
                };

                try {
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Updating...';
                    submitBtn.disabled = true;

                    console.log('Sending profile update request with token:', token.substring(0, 20) + '...');
                    console.log('Form data:', formData);

                    const response = await fetch('/profile/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(formData)
                    });

                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);

                    const result = await response.json();
                    console.log('Update result:', result);

                    if (result.success) {
                        showSuccess('Profile completed successfully!');

                        // Update local user data
                        const updatedUser = { ...user, ...formData, needsProfileCompletion: false };
                        localStorage.setItem('currentUser', JSON.stringify(updatedUser));

                        // Redirect to homepage after delay
                        setTimeout(() => {
                            window.location.href = '/userhomepage';
                        }, 2000);
                    } else {
                        showError('Profile update failed: ' + result.message);
                        submitBtn.textContent = 'Complete Profile';
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showError('An error occurred. Please try again.');
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Complete Profile';
                    submitBtn.disabled = false;
                }
            });

            // Initialize validation messages on load
            validateMobileNumber();
            validateGender();
            validateAge();

            function showError(message) {
                removeExistingAlerts();
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert alert-danger';
                alertDiv.innerHTML = `
            <div style="padding-right: 30px;">${message}</div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" 
                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%);"
                onclick="this.parentElement.remove()"></button>
        `;
                document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.bannerLogo'));
            }

            function showSuccess(message) {
                removeExistingAlerts();
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert alert-success';
                alertDiv.innerHTML = `
            <div style="padding-right: 30px;">${message}</div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" 
                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%);"
                onclick="this.parentElement.remove()"></button>
        `;
                document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.bannerLogo'));
            }

            function removeExistingAlerts() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(alert => alert.remove());
            }
        });
    </script>
</body>

</html>
